<!DOCTYPE html>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

    <style>
        .vl {
            border-left: 2px solid gray;
            height: 70px;
            width: 20px;
            margin-top: 20px;
        }

        .pricebox {
            display: inline-flex;
            margin: 0px;
            padding: 0px 20px 20px 5px;
            max-width: 250px;
            width: 235px;
            height: 145px;
            border-width: 1px;
            border-color: LightGray;
            border-style: solid;
            text-align: center;
            vertical-align: central;
            flex: auto;
            flex-direction: row;
            justify-content: stretch;
            box-sizing: border-box;
        }

        .smallDiv {
            vertical-align: central;
        }

        .div-vertical {
            width: 15%;
            float: right;
            -webkit-transform: translate(10px,0)
        }

        .div-horiz {
            width: 85%;
            float: left;
        }



        .smalltag {
            display: inline-flex;
            margin: 0px;
            padding: 8px 15px 15px 8px;
            max-width: 220px;
            width: 220px;
            height: 96px;
            max-height: 96px;
            border-width: 1px;
            border-color: LightGray;
            border-style: solid;
            text-align: center;
            vertical-align: central;
            flex: auto;
            flex-direction: row;
            justify-content: stretch;
            box-sizing: border-box;
        }

        @media print{
            header, footer, nav, .sidebar, .nonprintable,.btn {

            }

              size:A4;
              margin:20px;
          }

</head>
<body>
        <!-- ================= print btn ==================== -->
    <button class=" bi-printer  btn btn-primary h-auto nonprintable" onclick="window.print()"> Print at HP printer </button>

    <!-- ================= checkbox ==================== -->
    <div class="nonprintable">
        <div class="form-check" style="visibility:visible">
            <input class="form-check-input" type="radio" name="flexRadioDefault" id="radioLargetag" checked>
            <label class="form-check-label" for="flexRadioDefault1">
                Default Price tag
            </label>
        </div>
        <div class="form-check">
            <input class="form-check-input" type="radio" name="flexRadioDefault" id="radioSmalltag" >
            <label class="form-check-label" for="flexRadioDefault2">
                Small size price tag (for small ruller)
            </label>
        </div>
    </div>

    <div id="outputLarge"></div>
    <div id="outputSmall" style="display:none"></div>

    <script>
        $(document).ready(function() {
          processUrlText();

          //show small
        $('#radioSmalltag').click(function () {
            $('#outputSmall').css('display', 'inline-block');
            $('#outputLarge').css('display', 'none');
            console.log('small tag clicked');
        })

        //show large
        $('#radioLargetag').click(function () {
            $('#outputSmall').css('display', 'none');
            $('#outputLarge').css('display', 'inline-block');
            console.log('large tag clicked');
        })
        });


        let items = __ITEMS_JSON__;
        let riyalImageSrc = __RIYAL_JSON__;

  async function processUrlText(){

    //Generate barcode
      for (let i = 0; i < items.length; i++) {
        const item = items[i];
        let qrCode = await generateBarcode(item.nat_barcode);
        item.item_barcode = qrCode;

        //chk vat
        if(items[i].vat==0){
          items[i].vatAr='معفي الضريبة';
          items[i].vatEn='VAT Exempt';
        }else{
          items[i].vatAr='شامل الضريبة';
          items[i].vatEn='Including VAT';
        }
      }

    console.log(items);

    //print to dive
    const LargePriceTag = document.getElementById("outputLarge");
    const SmallPriceTag = document.getElementById("outputSmall");
    items.forEach(item => {
        //console.log(item.item_barcode);
        //outputDiv.innerHTML += createHTML(item);
        LargePriceTag.innerHTML += LargeSizeTagHTML(item);
        SmallPriceTag.innerHTML += smallSizeTagHTML(item);
      });
  }

//create barcode
     async function generateBarcode(number) {
          const canvas = document.createElement('canvas');

          JsBarcode(canvas, number, {
              format: "CODE128",
              displayValue: false,
              width: 2,
              height: 50,
              margin: 0,
              text: number,
              textAlign: "center",
              textPosition: "bottom"
          });

          // Create a new canvas element with a rotated context
          const rotatedCanvas = document.createElement('canvas');
          rotatedCanvas.width = canvas.height;
          rotatedCanvas.height = canvas.width;
          const ctx = rotatedCanvas.getContext('2d');
          ctx.translate(rotatedCanvas.width, 0);
          ctx.rotate(Math.PI / 2);
          ctx.drawImage(canvas, 0, 0);

          const dataURL = canvas.toDataURL();

          return dataURL;
      }

function LargeSizeTagHTML(item) {
        return `
          <!-- template 3 -->
          <div class="col pricebox thickborder">
            <div class="div-horiz" style="box-sizing: border-box;">
                <table>
                    <tbody>
                        <tr>
                            <td style="text-align:left">
                                <div style="font-weight:normal ; font-size:Small;-webkit-transform: translate(0,0px) ">
                                    <span style="font-size: 25px; color: #000000; visibility: ${item.is_smart ? 'visible' : 'hidden'};">&#x25A0;</span>
                                </div>
                            </td>
                            <td rowspan="2" style="text-align:right">
                                <div style="font-size:xx-small">
                                    ${item.vatEn}
                                    <br />${item.vatAr}
                                </div>
                            </td>
                        </tr>

                        <tr>
                            <td style="text-align:left">
                                <div style="font-weight: bold; font-size: 28px; -webkit-transform: translate(0,-10px); display: flex; align-items: center; gap: 3px;">
                                  <img src="${riyalImageSrc}" alt="SAR" style="height: 20px; width: auto;">
                                  ${item.item_price}
                                </div>
                            </td>
                        </tr>

                        <tr>
                            <td colspan="2" style="text-align:left">
                                <div style="font-weight: bold; font-size: 11px; -webkit-transform: translate(0,-15px) ">
                                  ${item.eng_name}
                                </div>

                            </td>
                        </tr>
                        <tr>
                            <td colspan="2" style="text-align:left">
                                <div style="font-weight: bold; font-size: 11px; -webkit-transform: translate(0,-15px) ">
                                  ${item.ar_name}
                                </div>

                            </td>
                        </tr>

                    </tbody>
                </table>

            </div>

            <!-- barcode dive -->
            <div class="div-vertical" >
                <div class="fa-rotate-90">
                    <img src="${item.item_barcode}" alt="qrocde" style="height: 20px; width: 125px; -webkit-transform: translate(-20px,10)" />
                    <br />
                    <div style="-webkit-transform:translate(5px,20) ;font-size: 12px;"> ${item.nat_barcode} </div>
                </div>
            </div>
            </div>

          `
      }

//============== small size template
      //price template function   font-family: Arial Black;
      function smallSizeTagHTML(item) {
        return `
          <!-- template 3 -->
          <div class="col smalltag thickborder">
            <div class="div-horiz" style="box-sizing: border-box;">
              <table style="-webkit-transform: translate(0,-15px)">
                  <tbody>
                      <tr>
                          <td style="text-align:left">
                              <div style="font-weight: normal; font-size: xx-small;-webkit-transform: translate(0,0px) ">
                                  <span style="font-size: 15px; color: #000000; visibility: ${item.is_smart ? 'visible' : 'hidden'};">&#x25A0;</span>
                              </div>
                          </td>
                          <td rowspan="2" style="text-align: right; -webkit-transform: translate(0,-10px)">
                              <div style="font-size:xx-small">
                                  ${item.vatEn}
                                  <br />${item.vatAr}
                              </div>
                          </td>
                      </tr>

                      <tr>
                          <td style="text-align:left ">
                              <div style="font-weight: bold; Black; font-size: 20px; -webkit-transform: translate(0,-8px); display: flex; align-items: center; gap: 2px;">
                                  <img src="${riyalImageSrc}" alt="SAR" style="height: 15px; width: auto;">
                                  ${item.item_price}
                              </div>
                          </td>
                      </tr>

                      <tr>
                          <td colspan="2" style="text-align:left">
                              <div style="font-weight: bold; font-size: 9px; -webkit-transform: translate(0,-15px) ">
                                ${item.eng_name}
                              </div>

                          </td>
                      </tr>
                      <tr>
                          <td colspan="2" style="text-align:left">
                              <div style="font-weight: bold; font-size: 9px; -webkit-transform: translate(0,-15px) ">
                                ${item.ar_name}
                              </div>

                          </td>
                      </tr>

                  </tbody>
              </table>

            </div>

              <!-- barcode dive -->
                <div class="div-vertical" style="-webkit-transform: translate(10px,8px); transform: translate(10px,8px);">
                    <div class="fa-rotate-90">
                        <img src="${item.item_barcode}" alt="qrocde" style="height: 15px; width: 70px; -webkit-transform: translate(-15px,0)" />
                        <br />
                        <div style="font-size: 8px; -webkit-transform: translate(-10px,0)"> ${item.nat_barcode} </div>
                    </div>
                </div>
          </div>

          `
      }
    </script>
